<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="FluentMind: World's Most Premium English Pronunciation & Vocabulary Learning Platform">
    <meta name="theme-color" content="#050505">
    <meta name="author" content="Abhay Ojha">
    <title>FluentMind | Master English Pronunciation & Vocabulary</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="assets/pages/manifest.json">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        dark: { bg: '#050505', card: '#101114', cardSec: '#18191C' },
                        light: { bg: '#FFFFFF', card: '#F9FAFB', cardSec: '#F3F4F6' },
                        accent: {
                            blue: '#4F8CFF', purple: '#8B5CF6', cyan: '#00D4FF',
                            green: '#34D399', orange: '#FB923C', red: '#EF4444'
                        }
                    },
                    backdropBlur: { xs: '2px' }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Motion One (Vanilla JS animation engine by Framer team) -->
    <script src="https://cdn.jsdelivr.net/npm/motion@10.16.2/dist/motion.js"></script>

    <!-- Custom Core CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="bg-light-bg dark:bg-dark-bg text-gray-900 dark:text-white transition-colors duration-300 ease-in-out overflow-x-hidden antialiased">
    
    <!-- Animated Ambient Background -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden" aria-hidden="true">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-accent-purple/20 dark:bg-accent-purple/10 rounded-full blur-[120px] animate-aurora-1"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-accent-blue/20 dark:bg-accent-blue/10 rounded-full blur-[120px] animate-aurora-2"></div>
        <div class="absolute top-[40%] left-[50%] w-[30%] h-[30%] bg-accent-cyan/10 dark:bg-accent-cyan/5 rounded-full blur-[100px] animate-aurora-3"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.03%22/%3E%3C/svg%3E')] opacity-50"></div>
    </div>

    <!-- App Container -->
    <div id="app" class="relative z-10 flex flex-col min-h-screen">
        <!-- Navbar injected here -->
        <header id="navbar-container" class="sticky top-0 z-40"></header>

        <!-- Main Dynamic Content -->
        <main id="main-content" class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div id="loading-skeleton" class="space-y-4 animate-pulse pt-10">
                <div class="h-10 bg-gray-200 dark:bg-dark-cardSec rounded-lg w-3/4 mx-auto"></div>
                <div class="h-4 bg-gray-200 dark:bg-dark-cardSec rounded w-1/2 mx-auto"></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12">
                    <div class="h-48 bg-gray-200 dark:bg-dark-cardSec rounded-2xl"></div>
                    <div class="h-48 bg-gray-200 dark:bg-dark-cardSec rounded-2xl"></div>
                    <div class="h-48 bg-gray-200 dark:bg-dark-cardSec rounded-2xl"></div>
                </div>
            </div>
        </main>

        <!-- Footer injected here -->
        <footer id="footer-container"></footer>
    </div>

    <!-- Global Modals Container -->
    <div id="modals-container"></div>

    <!-- Core Application Scripts (Loaded in strict dependency order) -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/data/wordSeed.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/gamification.js"></script>
    <script src="assets/components/navbar.js"></script>
    <script src="assets/components/sidebar.js"></script>
    <script src="assets/components/footer.js"></script>
    <script src="assets/components/searchModal.js"></script>
    <script src="assets/pages/landing.js"></script>
    <script src="assets/pages/dashboard.js"></script>
    <script src="assets/pages/vocabulary.js"></script>
    <script src="assets/pages/wordDetail.js"></script>
    <script src="assets/pages/learning.js"></script>
    <script src="assets/pages/pronunciation.js"></script>
    <script src="assets/pages/leaderboard.js"></script>
    <script src="assets/pages/admin.js"></script>
    <script src="assets/pages/about.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
